codecov:
  branch: master
  strict_yaml_branch: master

coverage:
  precision: 2
  round: down
  range: "70...100"
  ignore:
    - "*/python?.?/*"
    - "*/tests/*"
    - "setup.py"
  status:
    project:
      default:
        target: 70%
        threshold: 1%
        flags:
          - cli
        if_ci_failed: error
        informational: false
    patch:
      default:
        target: 80%
        threshold: 0%
        if_ci_failed: error
        only_pulls: true

flags:
  cli:
    paths:
      - evalai/

comment:
  layout: "header, diff, flags, files, footer"
  behavior: default
  require_head: yes

github_checks:
  annotations: true
